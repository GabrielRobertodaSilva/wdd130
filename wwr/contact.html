<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Extreme Flow Rafting</title>
    <meta name="description"
      content="Contact Extreme Flow Rafting for reservation, question, or suggestion about our rafting adventures.">
    <meta name="author" content="Gabriel Roberto da Silva">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.jpeg" alt="logo icon">
        <div id="logo"></div>
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>

        <section class="contact-container">


            <div class="contact-info">
                <h1>Extreme Flow Rafting</h1>

                <p>
                    123 Main River Street<br>
                    Kolob, California<br>
                    +1 999 999 9999<br>
                    info@whitewater.com
                </p>

                <iframe src="https://www.google.com/maps?q=Kolob,California&output=embed">
                </iframe>
            </div>


            <div class="contact-form">
                <h2>Send Us a Message</h2>

                <form>

                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">

                    <p>Purpose of Message:</p>

                    <label for="general">
                        <input type="radio" id="general" name="purpose" value="general"> General
                        Inquiry</label>

                    <label for="reservation">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation
                        Question</label>

                    <label for="suggestion">
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        Website
                        Suggestion</label>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message"></textarea>

                    <label for="subscribe">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Send Message</button>

                </form>
            </div>

        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-list">
                <figure>
                    <img src="images/employee1.jpg" alt="John Smith">
                    <figcaption>John Smith - Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Mary Johnson">
                    <figcaption>Mary Johnson - Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Lucas Brown">
                    <figcaption>Lucas Brown - Instructor</figcaption>
                </figure>
            </div>


        </section>

    </main>
    <footer>
        <p>© 2026 Extreme Flow Rafting, Gabriel Roberto da Silva</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com">
                <img src="images/facebook.svg" alt="link facebook">
            </a>
            <a href="https://www.linkedin.com">
                <img src="images/linkedin.svg" alt="link linkedin">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/instagram.svg" alt="link instagram">
            </a>
        </nav>
    </footer>
</body>

</html>
